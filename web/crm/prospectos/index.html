<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prospectos — Tengo Visa CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#FF1117;--red-s:#FFE9EA;--blue:#001F73;--blue-s:#EAF0FF;--green:#16A34A;--green-s:#EAF8EE;--warn:#F59E0B;--warn-s:#FFF4DE;--bg:#F5F7FB;--card:#fff;--text:#0F172A;--soft:#475569;--faint:#64748B;--border:#D8E1F0;--r:12px;--sh:0 4px 18px rgba(15,23,42,0.07);--purple:#7C3AED;--purple-s:#F5F0FF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:var(--sh)}
.logo{height:34px;object-fit:contain;flex-shrink:0}
.global-search{flex:1;max-width:480px;position:relative}
.global-search input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:var(--bg)}
.global-search input:focus{border-color:var(--red);background:#fff}
.global-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}
.hdr-right{display:flex;gap:8px;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none;white-space:nowrap}
.btnp{background:var(--red);color:#fff}.btnp:hover{background:#D90D14}
.btno{background:#fff;color:var(--blue);border:1.5px solid var(--blue)!important}
.btng{background:#25D366;color:#fff}
.btnia{background:linear-gradient(135deg,var(--purple),#4F46E5);color:#fff}
.btndel{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA!important}
.btnw{background:var(--warn-s);color:#92400E;border:1.5px solid #FDE68A!important}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}
/* LEFT LIST */
.left{display:flex;flex-direction:column;width:440px;min-width:440px;border-right:1px solid var(--border);background:#fff;overflow:hidden}
.left-top{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.tabs{display:flex;background:var(--bg);border-radius:8px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border)}
.tab{flex:1;padding:7px 6px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--faint);transition:all .15s}
.tab.active{background:var(--red);color:#fff}
.filters{display:flex;gap:6px}
.sinp{padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;outline:none;flex:1}
.sinp:focus{border-color:var(--red)}
.ssel{padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:11px;font-family:'Inter',sans-serif;outline:none;background:#fff}
.stats-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.sm{background:var(--bg);border-radius:7px;padding:7px;text-align:center;border:1px solid var(--border)}
.sm-val{font-size:16px;font-weight:800}
.sm-lbl{font-size:9px;color:var(--faint);font-weight:600}
/* LISTA */
.list-body{flex:1;overflow-y:auto}
.lead-item{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.lead-item:hover{background:var(--red-s)}
.lead-item.active{background:var(--blue-s);border-left:3px solid var(--blue)}
.lead-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
.lead-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.lead-name{font-weight:700;font-size:13px;line-height:1.2}
.lead-code{font-size:10px;font-weight:700;color:var(--blue);background:var(--blue-s);padding:1px 6px;border-radius:4px;display:inline-block}
.lead-meta{font-size:10px;color:var(--faint);margin-top:2px}
.lead-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.bg{background:var(--green-s);color:var(--green)}.bw{background:var(--warn-s);color:#92400E}
.br{background:var(--red-s);color:var(--red)}.bb{background:var(--blue-s);color:var(--blue)}
.bgr{background:#F1F5F9;color:var(--soft)}.bpu{background:var(--purple-s);color:var(--purple)}
.lead-score{position:absolute;right:12px;top:11px;text-align:center}
.lead-score-val{font-size:15px;font-weight:800}
.lead-score-lbl{font-size:8px;color:var(--faint);font-weight:600}
.temp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px}
/* RIGHT PANEL */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.rp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--faint);font-size:13px}
/* FICHA CLIENTE */
.ficha{display:flex;flex-direction:column;flex:1;overflow:hidden}
.ficha-hdr{background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;flex-shrink:0}
.ficha-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ficha-avatar{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.ficha-nombre{font-size:18px;font-weight:800;color:var(--text)}
.ficha-codigo{font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-s);padding:3px 10px;border-radius:6px}
.ficha-meta{font-size:12px;color:var(--faint);margin-top:2px}
.ficha-actions{display:flex;gap:6px;flex-wrap:wrap}
/* PROGRESO */
.progreso-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex:1}
.progreso-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),#FF6B6B)}
/* TABS FICHA */
.ftabs{display:flex;border-bottom:1px solid var(--border);background:#fff;overflow-x:auto;flex-shrink:0}
.ftab{padding:10px 14px;font-size:11px;font-weight:600;color:var(--faint);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.ftab.active{color:var(--red);border-bottom-color:var(--red);background:#fff}
.ftab:hover:not(.active){color:var(--text);background:var(--bg)}
.fbody{flex:1;overflow-y:auto;padding:14px 16px}
.ftp{display:none}.ftp.active{display:block}
/* SECCIONES */
.fsec{margin-bottom:16px;background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.fsec-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.fsec-tit{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.7px}
.fsec-body{padding:12px 14px}
.dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.dgrid2{grid-template-columns:1fr 1fr}
.df{background:var(--bg);border-radius:7px;padding:7px 10px}
.dl{font-size:9px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.dv{font-size:12px;font-weight:600;color:var(--text);margin-top:1px;word-break:break-word}
.dv.ok{color:var(--green)}.dv.no{color:var(--red)}
/* SCORE GRANDE */
.score-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:12px;margin-bottom:12px}
.sc-ring{width:70px;height:70px;border-radius:50%;border:6px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.sc-n{font-size:22px;font-weight:800;line-height:1}
.sc-s{font-size:9px;font-weight:600;opacity:.6}
/* PIPELINE ETAPAS */
.etapas{display:flex;gap:0;margin-bottom:14px;overflow-x:auto}
.etapa-item{flex:1;min-width:80px;padding:8px 6px;text-align:center;border:1.5px solid var(--border);font-size:9px;font-weight:700;cursor:pointer;transition:all .15s;background:#fff;color:var(--faint);white-space:nowrap}
.etapa-item:first-child{border-radius:8px 0 0 8px}
.etapa-item:last-child{border-radius:0 8px 8px 0}
.etapa-item:not(:first-child){border-left:none}
.etapa-item.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.etapa-item.done{background:var(--green-s);color:var(--green);border-color:var(--green)}
/* PAGOS */
.pago-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px}
.pago-item:last-child{border-bottom:none}
.pago-ico{width:30px;height:30px;border-radius:8px;background:var(--green-s);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pago-monto{font-weight:800;font-size:14px;color:var(--green)}
.pago-det{font-size:10px;color:var(--faint)}
/* TIMELINE */
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.tl-item:last-child{border-bottom:none}
.tl-ico{width:28px;height:28px;border-radius:8px;background:var(--blue-s);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.tl-txt{font-weight:600}
.tl-sub{font-size:10px;color:var(--faint);margin-top:1px}
/* SEG */
.seg-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
/* IA */
.ia-box{background:linear-gradient(135deg,#0F172A,#1E293B);color:#fff;border-radius:11px;padding:14px}
.ia-text{font-size:11px;color:#E2E8F0;line-height:1.7;white-space:pre-wrap}
/* FORMULARIOS INLINE */
.form-inline{background:var(--bg);border-radius:10px;padding:12px;margin-top:10px;border:1px solid var(--border)}
.form-inline label{font-size:10px;font-weight:700;color:var(--soft);display:block;margin-bottom:3px}
.inp{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;margin-bottom:8px}
.inp:focus{border-color:var(--red)}
.sel{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;background:#fff;margin-bottom:8px}
.ta{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* ESTADO SEL */
.estado-sel{padding:4px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:10px;font-family:'Inter',sans-serif;outline:none;cursor:pointer;background:#fff}
/* TARIFA */
.tarifa-card{background:linear-gradient(135deg,var(--blue),#0A2E8A);color:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.tarifa-total{font-size:28px;font-weight:800}
.tarifa-sub{font-size:11px;opacity:.8;margin-top:2px}
.tarifa-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.15);font-size:12px}
.tarifa-row:last-child{border-bottom:none}
/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:#0F172A;color:#fff;padding:10px 16px;border-radius:9px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;padding:24px;color:var(--faint);font-size:12px}
@media(max-width:1100px){
  .left{width:380px;min-width:380px}
}
@media(max-width:900px){
  body{overflow:auto}
  .layout{flex-direction:column;height:auto;overflow:visible}
  .left{width:100%;min-width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .list-body{max-height:50vh;overflow-y:auto}
  .right{width:100%;min-width:100%;position:relative;transform:none!important;display:none}
  .right.open{display:flex}
  .ficha-hdr{padding:10px 12px}
  .ficha-nombre{font-size:15px}
  .dgrid{grid-template-columns:1fr 1fr}
  .fbody{padding:10px 12px}
  .hdr{flex-wrap:wrap;gap:6px}
  .global-search{order:3;flex:1 1 100%}
  .hdr-right{gap:5px}
  .btn{padding:6px 10px;font-size:11px}
}
@media(max-width:600px){
  .stats-mini{grid-template-columns:repeat(2,1fr)}
  .dgrid{grid-template-columns:1fr}
  .dgrid2{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .ftab{padding:8px 10px;font-size:10px}
  .ficha-actions{gap:4px}
  .ficha-actions .btn{flex:1;justify-content:center;font-size:10px;padding:5px 8px}
  .tarifa-total{font-size:22px}
  .etapas{gap:0}
  .etapa-item{font-size:8px;padding:6px 4px}
}
</style>
</head>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='/api', KEY='TengoVisa2026API';
let evalData=[], ds160Data=[], pasData=[], curTab='eval', curId=null, curData=null;
const CL={alto_riesgo:'🔴 Alto Riesgo',potencial_medio:'🟡 Potencial Medio',potencial_alto:'🟢 Potencial Alto',perfil_solido:'🔵 Perfil Sólido'};
const ETAPAS=['captacion','evaluacion','documentos','ais_ice','cita','aprobado'];
const ETAPA_LABELS={captacion:'📥 Captación',evaluacion:'📋 Evaluación',documentos:'📁 Documentos',ais_ice:'💻 AIS/ICE',cita:'📅 Cita',aprobado:'✅ Aprobado'};
const COLORS=['#3B82F6','#F59E0B','#8B5CF6','#06B6D4','#EF4444','#16A34A'];
const TEMP_COLORS={CALIENTE:'#EF4444',TIBIO:'#F59E0B',FRIO:'#64748B'};
const TEMP_EMOJI={CALIENTE:'🔥',TIBIO:'🟡',FRIO:'❄️'};

function toast(m,ok=true){const t=document.getElementById('toast');t.textContent=m;t.style.background=ok?'#0F172A':'var(--red)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function fmtDate(dt){if(!dt)return'—';const d=new Date(dt);return d.toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'});}
function fmtMoney(n){return'RD$ '+(Number(n)||0).toLocaleString('es-DO');}
function initials(n){return(n||'?').split(' ').map(x=>x[0]).join('').substring(0,2).toUpperCase();}
function avatarColor(n){const i=((n||'').charCodeAt(0)||0)%COLORS.length;return COLORS[i];}

function switchTab(t){
  curTab=t;
  ['E','D','P'].forEach((x,i)=>{document.getElementById('tab'+x).className='tab'+((['eval','ds160','pas'][i]===t)?' active':'');});
  filterData();
}

async function loadAll(){
  const [r1,r2,r3]=await Promise.all([
    fetch(API+'/crm/evaluaciones',{headers:{'x-api-key':KEY}}).then(r=>r.json()).catch(()=>[]),
    fetch(API+'/crm/ds160',{headers:{'x-api-key':KEY}}).then(r=>r.json()).catch(()=>[]),
    fetch(API+'/pasaporte',{headers:{'x-api-key':KEY}}).then(r=>r.json()).catch(()=>[])
  ]);
  evalData=Array.isArray(r1)?r1:[];
  ds160Data=Array.isArray(r2)?r2:[];
  pasData=Array.isArray(r3)?r3:[];
  document.getElementById('st1').textContent=evalData.length;
  document.getElementById('st2').textContent=evalData.filter(e=>e.estado==='nuevo'||e.estado==='calificado').length;
  document.getElementById('st3').textContent=ds160Data.length;
  document.getElementById('st4').textContent=evalData.filter(e=>e.estado==='convertido').length;
  filterData();
}

function filterData(){
  const q=(document.getElementById('srch').value||document.getElementById('globalSearch').value||'').toLowerCase();
  const est=document.getElementById('fEst').value;
  let data=[];
  if(curTab==='eval') data=evalData.filter(e=>
    (!q||(e.nombre||'').toLowerCase().includes(q)||(e.email||'').toLowerCase().includes(q)||
     (e.whatsapp||'').includes(q)||(e.codigo_cliente||'').toLowerCase().includes(q))&&
    (!est||e.estado===est)
  );
  else if(curTab==='ds160') data=ds160Data.filter(d=>{
    const dt=d.datos||{};
    const n=`${dt.q2_nombre||''} ${dt.q1_apellido||''}`.toLowerCase();
    return !q||n.includes(q)||(dt.q36_email||'').toLowerCase().includes(q)||(dt.q43_numpas||'').toLowerCase().includes(q);
  });
  else data=pasData.filter(p=>!q||(p.nombre||'').toLowerCase().includes(q)||(p.email||'').toLowerCase().includes(q));
  renderList(data);
}

function onGlobalSearch(v){
  document.getElementById('srch').value=v;
  filterData();
}

function renderList(data){
  const lb=document.getElementById('listBody');
  if(!data.length){lb.innerHTML=`<div class="empty">📭 Sin resultados<br><a href="/evaluacion/" target="_blank" style="color:var(--red);font-weight:700">+ Nueva evaluación →</a></div>`;return;}
  lb.innerHTML=data.map(e=>{
    const s=curTab==='eval'?e.score||0:0;
    const pct=Math.round(s/42*100);
    const col=pct>=80?'var(--green)':pct>=60?'var(--warn)':'var(--red)';
    const temp=e.lead_temperatura||'FRIO';
    const nom=curTab==='eval'?e.nombre:curTab==='ds160'?(()=>{const dt=e.datos||{};return`${dt.q2_nombre||''} ${dt.q1_apellido||''}`.trim()||'Sin nombre';})():(`${e.nombre||''} ${e.apellido||''}`).trim();
    const email=curTab==='eval'?e.email:curTab==='ds160'?(e.datos?.q36_email||''):e.email||'';
    const codigo=e.codigo_cliente||`TV-${(e.id||'').substring(0,6).toUpperCase()}`;
    const isActive=curId===e.id;
    return `<div class="lead-item${isActive?' active':''}" onclick="openItem('${e.id}')">
      <div class="lead-top">
        <div class="lead-avatar" style="background:${avatarColor(nom)}">${initials(nom)}</div>
        <div style="flex:1;min-width:0">
          <div class="lead-name">${nom||'Sin nombre'}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
            <span class="lead-code">${codigo}</span>
            <span style="font-size:10px;color:var(--faint)">${fmtDate(e.created_at)}</span>
          </div>
          <div class="lead-meta">${email}</div>
          <div class="lead-badges">
            <span class="badge ${e.estado==='convertido'?'bg':e.estado==='en_proceso'?'bw':e.estado==='calificado'?'bb':'bgr'}">${e.estado||'nuevo'}</span>
            ${curTab==='eval'&&temp?`<span class="badge" style="background:${TEMP_COLORS[temp]}20;color:${TEMP_COLORS[temp]}">${TEMP_EMOJI[temp]} ${temp}</span>`:''}
            ${curTab==='eval'&&e.clasificacion?`<span class="badge bpu">${CL[e.clasificacion]||e.clasificacion}</span>`:''}
          </div>
        </div>
        ${curTab==='eval'&&s?`<div class="lead-score"><div class="lead-score-val" style="color:${col}">${s}</div><div class="lead-score-lbl">/42</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function openItem(id){
  curId=id;
  filterData(); // Refresh active state
  if(curTab==='eval'){
    const e=evalData.find(x=>x.id===id);
    if(!e) return;
    renderFicha360(e);
  } else if(curTab==='ds160'){
    const d=ds160Data.find(x=>x.id===id);
    if(!d) return;
    renderFichaDS160(d);
  } else {
    const p=pasData.find(x=>x.id===id);
    if(!p) return;
    renderFichaPas(p);
  }
  document.getElementById('rpEmpty').style.display='none';
  document.getElementById('fichaPanel').style.display='flex';
  // En móvil, scroll al panel
  if(window.innerWidth <= 900){
    document.getElementById('rightPanel').classList.add('open');
    document.getElementById('rightPanel').scrollIntoView({behavior:'smooth'});
  }
}

function renderFicha360(e){
  const ia=e.ia_analisis||{};
  const s=e.score||0, pct=Math.round(s/42*100);
  const col=pct>=80?'var(--green)':pct>=60?'var(--warn)':'var(--red)';
  const temp=e.lead_temperatura||'FRIO';
  const codigo=e.codigo_cliente||`TV-${(e.id||'').substring(0,6).toUpperCase()}`;
  const nom=e.nombre||'Sin nombre';
  curData=e;

  // Header
  document.getElementById('fichaAvatar').style.background=avatarColor(nom);
  document.getElementById('fichaAvatar').textContent=initials(nom);
  document.getElementById('fichaNombre').textContent=nom;
  document.getElementById('fichaCodigo').textContent=codigo;
  document.getElementById('fichaMeta').textContent=`${e.email||'—'} | ${e.whatsapp||'—'} | ${fmtDate(e.created_at)}`;
  document.getElementById('fichaOrigen').textContent=e.origen||'web';
  document.getElementById('fichaTempBadge').textContent=`${TEMP_EMOJI[temp]} ${temp}`;
  document.getElementById('fichaTempBadge').style.background=TEMP_COLORS[temp]+'20';
  document.getElementById('fichaTempBadge').style.color=TEMP_COLORS[temp];
  document.getElementById('fichaScoreBar').style.width=pct+'%';
  document.getElementById('fichaScoreTxt').textContent=`${s}/42 (${pct}%)`;
  document.getElementById('fichaScoreTxt').style.color=col;
  const sel=document.getElementById('fichaEstadoSel');
  sel.value=e.estado||'nuevo';

  // Actions
  document.getElementById('fichaActions').innerHTML=`
    <a href="https://wa.me/${(e.whatsapp||'').replace(/[^0-9]/g,'')}" target="_blank" class="btn btng" style="font-size:11px">💬 WhatsApp</a>
    <a href="mailto:${e.email}" class="btn btno" style="font-size:11px">✉️ Email</a>
    <button onclick="analizarIA('${e.id}')" class="btn btnia" style="font-size:11px">🤖 Analizar IA</button>
    <button onclick="deleteEval('${e.id}')" class="btn btndel" style="font-size:11px">🗑️</button>`;

  // Tabs
  document.getElementById('ftabs').innerHTML=`
    <div class="ftab active" onclick="ftab(this,'ft0')">📊 Resumen</div>
    <div class="ftab" onclick="ftab(this,'ft1')">👤 Datos</div>
    <div class="ftab" onclick="ftab(this,'ft2')">💼 Laboral</div>
    <div class="ftab" onclick="ftab(this,'ft3')">💰 Económico</div>
    <div class="ftab" onclick="ftab(this,'ft4')">✈️ Viaje</div>
    <div class="ftab" onclick="ftab(this,'ft5')">💳 Pagos</div>
    <div class="ftab" onclick="ftab(this,'ft6')">📝 Seguimiento</div>
    <div class="ftab" onclick="ftab(this,'ft7')">📋 Timeline</div>
    <div class="ftab" onclick="ftab(this,'ft8')">🤖 IA</div>`;

  const dp=e.datos_personales||{};
  const dfam=e.perfil_familiar||{};
  const dlab=e.perfil_laboral||{};
  const deco=e.perfil_economico||{};
  const dmig=e.perfil_migratorio||{};
  const dvia=e.proposito_viaje||{};
  const ff=(l,v,s=1)=>`<div class="df" style="grid-column:span ${s}"><div class="dl">${l}</div><div class="dv">${v||'—'}</div></div>`;

  // PIPELINE ETAPAS
  const etapaActual=e.etapa||'captacion';
  const idxActual=ETAPAS.indexOf(etapaActual);
  const pipeHtml=`<div class="etapas">${ETAPAS.map((et,i)=>`
    <div class="etapa-item ${i<idxActual?'done':i===idxActual?'active':''}" onclick="cambiarEtapa('${e.id}','${et}')">
      ${ETAPA_LABELS[et]}
    </div>`).join('')}</div>`;

  document.getElementById('fbody').innerHTML=`
  <div id="ft0" class="ftp active">
    ${pipeHtml}
    <div class="score-card">
      <div class="sc-ring" style="border-color:${col};color:${col}">
        <div class="sc-n">${s}</div><div class="sc-s">de 42</div>
      </div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:800">${CL[e.clasificacion]||'Sin clasificar'}</div>
        <div style="font-size:11px;color:var(--faint);margin-top:3px">Acción: ${ia.accion_recomendada||'—'}</div>
        ${ia.mensaje_whatsapp?`<div style="margin-top:8px;background:var(--green-s);border-radius:8px;padding:8px;font-size:11px;color:var(--green)">${ia.mensaje_whatsapp}</div>`:''}
      </div>
    </div>
    ${(ia.fortalezas||[]).length?`<div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">✅ Fortalezas</div></div><div class="fsec-body">${(ia.fortalezas||[]).map(f=>`<span class="badge bg" style="margin:2px">${f}</span>`).join('')}</div></div>`:''}
    ${(ia.debilidades||[]).length?`<div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">⚠️ Debilidades</div></div><div class="fsec-body">${(ia.debilidades||[]).map(d=>`<span class="badge bw" style="margin:2px">${d}</span>`).join('')}</div></div>`:''}
    ${(ia.alertas||[]).length?`<div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">🚨 Alertas</div></div><div class="fsec-body">${(ia.alertas||[]).map(a=>`<span class="badge br" style="margin:2px">${(a.nombre||a).replace(/_/g,' ')}</span>`).join('')}</div></div>`:''}
    ${(ia.documentos_sugeridos||[]).length?`<div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">📋 Documentos Sugeridos</div></div><div class="fsec-body">${(ia.documentos_sugeridos||[]).map(d=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">📄 ${d}</div>`).join('')}</div></div>`:''}
  </div>

  <div id="ft1" class="ftp">
    <div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">👤 Datos Personales</div></div>
    <div class="fsec-body"><div class="dgrid">
      ${ff('Nombre',`${dp.nombre||e.nombre||''} ${dp.apellido||e.apellido||''}`,2)}
      ${ff('Email',dp.email||e.email)}${ff('WhatsApp',dp.whatsapp||e.whatsapp)}
      ${ff('Edad',dp.edad?dp.edad+' años':'—')}${ff('Ciudad',dp.ciudad)}${ff('Nacionalidad',dp.nacionalidad)}
    </div></div></div>
    <div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">👨‍👩‍👧 Perfil Familiar</div></div>
    <div class="fsec-body"><div class="dgrid">
      ${ff('Estado Civil',dfam.estado_civil)}${ff('Hijos',dfam.hijos)}${ff('Dependientes',dfam.dependientes)}
      ${ff('Familia RD',dfam.familia_rd)}${ff('Familia EEUU',dfam.familia_eeuu)}${ff('Estatus EEUU',dfam.familia_eeuu_estatus)}
    </div></div></div>
  </div>

  <div id="ft2" class="ftp">
    <div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">💼 Perfil Laboral</div></div>
    <div class="fsec-body"><div class="dgrid">
      ${ff('Tipo',dlab.empleo_tipo)}${ff('Antigüedad',dlab.antiguedad)}${ff('Salario',dlab.salario_mensual?'RD$ '+Number(dlab.salario_mensual).toLocaleString():'—')}
      ${ff('Funciones',dlab.funciones,3)}${ff('Ingr. Adicionales',dlab.ingresos_adicionales?'Sí':'No')}${ff('Paga Impuestos',dlab.paga_impuestos)}
    </div></div></div>
  </div>

  <div id="ft3" class="ftp">
    <div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">💰 Perfil Económico</div></div>
    <div class="fsec-body"><div class="dgrid">
      ${ff('Negocio Propio',deco.negocio_propio?'✅ Sí':'❌ No')}${ff('Propiedades',deco.propiedades)}${ff('Vehículo',deco.vehiculo?'✅ Sí':'❌ No')}
      ${ff('Banco',deco.cuenta_bancaria)}${ff('Crédito',deco.historial_credito)}${ff('Inversiones',deco.inversiones?'✅ Sí':'❌ No')}
    </div></div></div>
  </div>

  <div id="ft4" class="ftp">
    <div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">🌍 Historial Migratorio</div></div>
    <div class="fsec-body"><div class="dgrid">
      ${ff('Visa Previa',dmig.visa_previa)}${ff('Negaciones',dmig.negaciones_previas)}${ff('Viajes EEUU',dmig.viajes_eeuu)}
    </div></div></div>
    <div class="fsec"><div class="fsec-hdr"><div class="fsec-tit">✈️ Propósito del Viaje</div></div>
    <div class="fsec-body"><div class="dgrid">
      ${ff('Motivo',dvia.motivo_viaje)}${ff('Duración',dvia.duracion_viaje)}${ff('Financiamiento',dvia.financiamiento)}
      ${ff('Observaciones',dvia.observaciones,3)}
    </div></div></div>
  </div>

  <div id="ft5" class="ftp">
    <div id="pagosContent">⏳ Cargando...</div>
    <div class="form-inline">
      <div style="font-size:11px;font-weight:800;color:var(--blue);margin-bottom:10px">+ Registrar Pago</div>
      <div class="form-row">
        <div><label>Monto (RD$)</label><input class="inp" id="pagoMonto" placeholder="0" type="number" inputmode="numeric"></div>
        <div><label>Método</label><select class="sel" id="pagoMetodo"><option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option><option value="transferencia">Transferencia</option><option value="lapaix">Lapaix</option></select></div>
      </div>
      <div><label>Servicio / Descripción</label>
        <select class="sel" id="pagoServicio" onchange="if(this.value==='otro')document.getElementById('pagoDesc').style.display='block'">
          <option value="">Seleccionar servicio...</option>
          <option value="Evaluación de Perfil">Evaluación RD$ 500</option>
          <option value="Preparación DS-160 básica">DS-160 básico RD$ 8,000</option>
          <option value="Preparación DS-160 completa">DS-160 completo RD$ 12,000</option>
          <option value="Servicio Completo B1/B2">Servicio completo RD$ 25,000</option>
          <option value="Reaplicación">Reaplicación RD$ 15,000</option>
          <option value="otro">Otro...</option>
        </select>
        <input class="inp" id="pagoDesc" placeholder="Descripción personalizada..." style="display:none;margin-top:4px">
      </div>
      <button class="btn btnp" onclick="registrarPago('${e.id}')" style="width:100%;margin-top:4px">💰 Registrar Pago</button>
    </div>
  </div>

  <div id="ft6" class="ftp">
    <div id="segContent">⏳ Cargando...</div>
    <div class="form-inline">
      <div style="font-size:11px;font-weight:800;color:var(--blue);margin-bottom:10px">+ Registrar Seguimiento</div>
      <div class="form-row">
        <div><label>Tipo</label><select class="sel" id="segTipo"><option value="whatsapp">💬 WhatsApp</option><option value="llamada">📞 Llamada</option><option value="email">✉️ Email</option><option value="cita">📅 Cita</option></select></div>
        <div><label>Resultado</label><input class="inp" id="segResultado" placeholder="Ej: Interesado, pidió info"></div>
      </div>
      <label>Mensaje enviado</label>
      <textarea class="ta" id="segMensaje" placeholder="Mensaje o notas de la conversación..."></textarea>
      <label style="margin-top:6px;display:block">Próximo paso</label>
      <input class="inp" id="segProximo" placeholder="Ej: Llamar en 2 días">
      <button class="btn btnp" onclick="registrarSeguimiento('${e.id}')" style="width:100%;margin-top:4px">📝 Guardar Seguimiento</button>
    </div>
  </div>

  <div id="ft7" class="ftp">
    <div id="timelineContent">⏳ Cargando...</div>
  </div>

  <div id="ft8" class="ftp">
    <div style="text-align:center;padding:16px 0">
      <button class="btn btnia" onclick="analizarIA('${e.id}')" style="margin:0 auto;max-width:280px">🤖 Analizar perfil completo con IA</button>
    </div>
    <div id="iaResult_${e.id}">
      ${ia.ia_texto?`<div class="ia-box"><div style="font-size:10px;font-weight:700;color:#818CF8;margin-bottom:8px">🤖 Último análisis guardado</div><div class="ia-text">${ia.ia_texto}</div></div>`:''}
    </div>
  </div>`;

  // Cargar datos dinámicos
  loadPagos(e.id);
  loadSeguimientos(e.id);
  loadTimeline(e.id);
}

async function loadPagos(lid){
  try{
    const r=await fetch(API+'/crm/cliente/'+lid,{headers:{'x-api-key':KEY}});
    const d=await r.json();
    if(d.error){document.getElementById('pagosContent').innerHTML='<div class="empty">Sin datos financieros</div>';return;}
    const rf=d.resumen_financiero||{};
    const pagos=d.pagos||[];
    const pct=rf.porcentaje||0;
    document.getElementById('pagosContent').innerHTML=`
      <div class="tarifa-card">
        <div class="tarifa-total">${fmtMoney(rf.tarifa_total)}</div>
        <div class="tarifa-sub">Tarifa total del servicio</div>
        <div style="height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px 0;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:#fff;border-radius:2px"></div>
        </div>
        <div class="tarifa-row"><span>Pagado</span><span style="color:#86EFAC;font-weight:700">${fmtMoney(rf.pagado)}</span></div>
        <div class="tarifa-row"><span>Pendiente</span><span style="color:#FCA5A5;font-weight:700">${fmtMoney(rf.pendiente)}</span></div>
        <div class="tarifa-row"><span>Progreso</span><span style="font-weight:700">${pct}%</span></div>
      </div>
      ${pagos.length?pagos.map(p=>`<div class="pago-item"><div class="pago-ico">💰</div><div style="flex:1"><div class="pago-monto">${fmtMoney(p.monto)}</div><div class="pago-det">${p.metodo} · ${p.descripcion||p.tipo} · ${fmtDate(p.created_at)}</div></div></div>`).join(''):'<div class="empty">Sin pagos registrados</div>'}`;
  }catch(e){document.getElementById('pagosContent').innerHTML='<div class="empty">Error cargando pagos</div>';}
}

async function loadSeguimientos(lid){
  try{
    const r=await fetch(API+'/crm/cliente/'+lid,{headers:{'x-api-key':KEY}});
    const d=await r.json();
    const segs=d.seguimientos||[];
    document.getElementById('segContent').innerHTML=segs.length?
      segs.map(s=>`<div class="seg-item"><div class="tl-ico">${s.tipo==='whatsapp'?'💬':s.tipo==='llamada'?'📞':s.tipo==='email'?'✉️':'📅'}</div><div><div class="tl-txt">${s.tipo} — ${s.resultado||'Sin resultado'}</div><div class="tl-sub">${s.proximo_paso?'Próx: '+s.proximo_paso:''} · ${fmtDate(s.created_at)}</div></div></div>`).join(''):
      '<div class="empty">Sin seguimientos registrados</div>';
  }catch(e){}
}

async function loadTimeline(lid){
  try{
    const r=await fetch(API+'/crm/cliente/'+lid,{headers:{'x-api-key':KEY}});
    const d=await r.json();
    const tl=d.timeline||[];
    document.getElementById('timelineContent').innerHTML=tl.length?
      `<div style="position:relative;padding-left:20px;border-left:2px solid var(--border)">${tl.map(t=>`

  try{
    await fetch(API+'/crm/pagos',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':KEY},

    toast('Pago registrado ✅');

async function cambiarEtapa(lid,etapa){
  try{

      body:JSON.stringify({etapa})});

async function updateEstado(estado){
  if(!curId) return;
  try{

  }catch(e){toast('Error','error');}

async function deleteEval(id){
  if(!confirm('¿Eliminar esta evaluación permanentemente?')) return;
  try{
    const r=await fetch(API+'/crm/evaluaciones/'+id,{method:'DELETE',headers:{'x-api-key':KEY}});
    const d=await r.json();
    if(d.ok){evalData=evalData.filter(e=>e.id!==id);filterData();document.getElementById('fichaPanel').style.display='none';document.getElementById('rpEmpty').style.display='flex';curId=null;toast('Eliminado ✅');}
    else toast('Error: '+d.error,'error');
  }catch(e){toast('Error','error');}
}

function ftab(el,tp){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.ftp').forEach(t=>t.classList.remove('active'));
  const tpEl=document.getElementById(tp);
  if(tpEl) tpEl.classList.add('active');
}

async function analizarIA(id){
  const e=evalData.find(x=>x.id===id);
  if(!e) return;
  // Ir al tab IA
  const tabs=document.querySelectorAll('.ftab');
  tabs.forEach(t=>t.classList.remove('active'));
  tabs[tabs.length-1]?.classList.add('active');
  document.querySelectorAll('.ftp').forEach(t=>t.classList.remove('active'));
  const iaDiv=document.getElementById('ft8');
  if(iaDiv) iaDiv.classList.add('active');

  const div=document.getElementById('iaResult_'+id);
  if(div) div.innerHTML='<div class="ia-box"><div style="color:#94A3B8;font-size:12px;text-align:center;padding:16px">⏳ Analizando perfil con IA... 15-20 segundos</div></div>';

  const ia=e.ia_analisis||{};
  const dp=e.datos_personales||{};
  const dlab=e.perfil_laboral||{};
  const deco=e.perfil_economico||{};
  const dmig=e.perfil_migratorio||{};
  const dvia=e.proposito_viaje||{};
  const dfam=e.perfil_familiar||{};

  const prompt=`Eres experto en visas B1/B2 con 20 años en República Dominicana. Analiza bajo INA §214(b):

CLIENTE: ${e.nombre} | Código: ${e.codigo_cliente||'TV-'+e.id?.substring(0,6)}
SCORE: ${e.score||0}/42 (${Math.round((e.score||0)/42*100)}%) | Clasificación: ${e.clasificacion||'N/A'}
TEMPERATURA: ${e.lead_temperatura||'N/A'} | Acción: ${ia.accion_recomendada||'N/A'}

PERFIL:
- Estado civil: ${dfam.estado_civil} | Hijos: ${dfam.hijos} | Familia EEUU: ${dfam.familia_eeuu}
- Empleo: ${dlab.empleo_tipo} | Salario: RD$${dlab.salario_mensual} | Antigüedad: ${dlab.antiguedad}
- Propiedades: ${deco.propiedades} | Vehículo: ${deco.vehiculo} | Banco: ${deco.cuenta_bancaria}
- Negocio: ${deco.negocio_propio} | Visa previa: ${dmig.visa_previa} | Negaciones: ${dmig.negaciones_previas}
- Motivo viaje: ${dvia.motivo_viaje} | Duración: ${dvia.duracion_viaje} | Financia: ${dvia.financiamiento}
- Observaciones: "${dvia.observaciones||'—'}"
- Fortalezas: ${(ia.fortalezas||[]).join(', ')||'ninguna'}
- Alertas: ${(ia.alertas||[]).map(a=>a.nombre||a).join(', ')||'ninguna'}

Entrega 7 secciones:
1. DIAGNÓSTICO (2 oraciones)
2. PROBABILIDAD DE APROBACIÓN (%)
3. FACTORES CRÍTICOS A REFORZAR (máx 4)
4. ESTRATEGIA DE PRESENTACIÓN AL CÓNSUL
5. DOCUMENTOS PRIORITARIOS (máx 5)
6. RECOMENDACIÓN COMERCIAL (cómo cerrar este cliente)
7. SEÑALES DE RIESGO (si las hay)

Directo, profesional, sin relleno. Español dominicano.`;

  try{
    const r=await fetch(API+'/ia/analizar',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':KEY},
      body:JSON.stringify({prompt,tipo:'evaluacion'})});
    const data=await r.json();
    const text=data.text||'Sin respuesta';
    // AUTO-GUARDAR IA inmediatamente
    try{
      await fetch(API+'/crm/evaluaciones/'+id+'/ia',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':KEY},
        body:JSON.stringify({ia_texto:text})});
      // Actualizar en memoria
      evalData=evalData.map(e=>e.id===id?{...e,ia_analisis:{...e.ia_analisis||{},ia_texto:text,ia_fecha:new Date().toISOString()}}:e);
    }catch(err){}
    if(div) div.innerHTML=`<div class="ia-box">
      <div style="font-size:10px;font-weight:700;color:#818CF8;margin-bottom:8px">🤖 Análisis IA — ${new Date().toLocaleString('es-DO')} <span style="color:#86EFAC">✅ Guardado</span></div>
      <div class="ia-text">${text}</div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #334155;display:flex;gap:6px">
        <button onclick="copiarWA('${encodeURIComponent(text)}')" class="btn btng" style="font-size:10px;padding:5px 10px">💬 Copiar WA</button>
        <button onclick="copiarWA('${encodeURIComponent(text)}')" class="btn btno" style="font-size:10px;padding:5px 10px">📋 Copiar todo</button>
      </div>
    </div>`;
  }catch(err){if(div) div.innerHTML=`<div class="ia-box"><div style="color:#FCA5A5">❌ Error: ${err.message}</div></div>`;}
}

async function analizarDS160IA(id){
  const d=ds160Data.find(x=>x.id===id);
  if(!d) return;
  const dt=d.datos||{};
  const div=document.getElementById('iaDS160_'+id);
  if(div) div.innerHTML='<div class="ia-box"><div style="color:#94A3B8;font-size:12px;text-align:center;padding:16px">⏳ Analizando DS-160...</div></div>';
  const g=k=>dt[k]||'N/A';
  const prompt=`Analiza DS-160 para visa B1/B2 RD:
Nombre: ${g('q2_nombre')} ${g('q1_apellido')} | Ocupación: ${g('q131_ocupacion')} en ${g('q132_empleador')}
Salario: ${g('q140_salario')} | Funciones: ${g('q141_funciones')}
Propósito: ${g('q55_proposito')} | Duración: ${g('q64_duracion')} | Hospedaje: ${g('q66_ciudad_hosp')}, ${g('q67_estado_hosp')}
Visitó EEUU: ${g('q82_estuvo')} | Visa previa: ${g('q87_visa_prev')} | Negación: ${g('q93_negacion')}
Estado civil: ${g('q8_civil')} | Padre EEUU: ${g('q111_padre_eeuu')} | Madre EEUU: ${g('q116_madre_eeuu')}
Arrestado: ${g('q177')} | Overstay: ${g('q199')} | Deportado: ${g('q185')}
Dame: 1)Revisión DS-160 2)Fortalezas 3)Riesgos 4)Estrategia entrevista 5)Documentos 6)Correcciones 7)Probabilidad`;
  try{
    const r=await fetch(API+'/ia/analizar',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':KEY},body:JSON.stringify({prompt,tipo:'ds160'})});
    const data=await r.json();
    if(div) div.innerHTML=`<div class="ia-box"><div style="font-size:10px;font-weight:700;color:#818CF8;margin-bottom:8px">🤖 Análisis DS-160</div><div class="ia-text">${data.text||'Sin respuesta'}</div></div>`;
  }catch(err){if(div) div.innerHTML='<div class="ia-box"><div style="color:#FCA5A5">❌ Error</div></div>';}
}

function exportDS160(id){
  const d=ds160Data.find(x=>x.id===id);
  if(!d) return;
  const blob=new Blob([JSON.stringify(d.datos||{},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`ds160_${(d.datos?.q1_apellido||id).toLowerCase()}.json`;a.click();
  toast('Exportado ✅');
}
